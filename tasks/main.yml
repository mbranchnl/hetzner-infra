---
- name: Validate required variables
  ansible.builtin.include_tasks: pre_flight.yml

- name: Manage SSH keys
  ansible.builtin.include_tasks: ssh_keys.yml
  when: hetzner_ssh_keys_upload | length > 0
  run_once: true

- name: Manage private networks
  ansible.builtin.include_tasks: network/networks.yml
  when: hetzner_networks_config | length > 0
  run_once: true

- name: Manage firewalls
  ansible.builtin.include_tasks: network/firewalls.yml
  when: hetzner_firewalls_config | length > 0
  run_once: true

- name: Manage server lifecycle
  ansible.builtin.include_tasks: server.yml

- name: Manage volumes
  ansible.builtin.include_tasks: volumes.yml
  when: hetzner_volumes | length > 0

- name: Manage floating IPs
  ansible.builtin.include_tasks: network/floating_ip.yml
  when: hetzner_floating_ips | length > 0

- name: Purge unmanaged servers
  ansible.builtin.include_tasks: purge.yml
  when: hetzner_manage_absent | bool
  run_once: true
